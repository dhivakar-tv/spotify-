<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-brands fa-spotify"></i>
                <span>Spotify</span>
            </div>
            <nav>
                <ul>
                    <li class="active"><i class="fa-solid fa-house"></i> Home</li>
                    <li><i class="fa-solid fa-magnifying-glass"></i> Search</li>
                    <li><i class="fa-solid fa-book"></i> Your Library</li>
                </ul>
            </nav>
            <div class="playlists">
                <p>PLAYLISTS</p>
                <ul>
                    <li>My Favorites</li>
                    <li>Coding Mix</li>
                    <li>Relaxing Sounds</li>
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="nav-btns">
                    <button><i class="fa-solid fa-chevron-left"></i></button>
                    <button><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="user-profile" id="logout-btn">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                </div>
            </header>
            
            <div class="content-header">
                <div class="header-title-container">
                    <h1>Featured Playlist</h1>
                    <button id="open-add-modal-btn" class="add-song-btn"><i class="fa-solid fa-plus"></i> Add Song</button>
                </div>
            </div>

            <!-- Song List -->
            <div class="song-list-container" id="scroll-container">
                <div class="song-list-header">
                    <div class="header-num">#</div>
                    <div class="header-title">TITLE</div>
                    <div class="header-album">ALBUM</div>
                    <div class="header-time"><i class="fa-regular fa-clock"></i></div>
                    <div class="header-actions"></div>
                </div>
                <div class="song-list" id="song-list">
                    <!-- Dynamic songs will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Bottom Player -->
    <footer class="player">
        <div class="player-left">
            <div class="album-art-placeholder" id="current-album-art">
                <i class="fa-solid fa-music"></i>
            </div>
            <div class="song-info">
                <div class="song-title" id="current-title">Select a song</div>
                <div class="song-artist" id="current-artist">Artist</div>
            </div>
            <i class="fa-regular fa-heart heart-icon"></i>
        </div>
        
        <div class="player-center">
            <div class="player-controls">
                <i class="fa-solid fa-shuffle control-icon"></i>
                <i class="fa-solid fa-backward-step control-icon" id="prev-btn"></i>
                <div class="play-pause-btn" id="play-pause-btn">
                    <i class="fa-solid fa-play" id="play-icon"></i>
                </div>
                <i class="fa-solid fa-forward-step control-icon" id="next-btn"></i>
                <i class="fa-solid fa-repeat control-icon"></i>
            </div>
            <div class="playback-bar">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" min="0" max="100" value="0">
                <span id="total-duration">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <i class="fa-solid fa-volume-low"></i>
            <input type="range" id="volume-bar" min="0" max="100" value="100">
        </div>
    </footer>

    <!-- Add Song Modal -->
    <div id="add-song-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal-btn">&times;</span>
            <h2>Add New Song</h2>
            <form id="add-song-form">
                <div class="input-group">
                    <label for="song-title">Title</label>
                    <input type="text" id="song-title" required>
                </div>
                <div class="input-group">
                    <label for="song-artist">Artist</label>
                    <input type="text" id="song-artist" required>
                </div>
                <div class="input-group">
                    <label for="song-album">Album</label>
                    <input type="text" id="song-album" required>
                </div>
                <div class="input-group">
                    <label for="song-url">MP3 URL</label>
                    <input type="url" id="song-url" required>
                </div>
                <button type="submit" class="save-song-btn">Save Song</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
